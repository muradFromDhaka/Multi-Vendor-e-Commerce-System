<div class="container-fluid py-4">

  <div class="card shadow-sm">

    <div class="card-header">

      <h4 class="mb-0">

        {{ isEdit ? 'Edit Product' : 'Add Product' }}

      </h4>

    </div>

    <div class="card-body">

      <form
        [formGroup]="productForm"
        (ngSubmit)="submit()">

        <!-- Product Name -->

        <div class="mb-3">

          <label class="form-label">

            Product Name

          </label>

          <input
            type="text"
            class="form-control"
            formControlName="name">

          <small
  class="text-danger"
  *ngIf="productForm.get('name')?.touched && productForm.get('name')?.errors">

  <span *ngIf="productForm.get('name')?.errors?.['required']">
    Product name is required.
  </span>

  <span *ngIf="productForm.get('name')?.errors?.['minlength']">
    Product name must be at least 3 characters.
  </span>

</small>

        </div>

        <!-- Description -->

        <div class="mb-3">

          <label class="form-label">

            Description

          </label>

          <textarea
            rows="4"
            class="form-control"
            formControlName="description">

          </textarea>

        </div>

        <div class="row">

          <!-- Category -->

          <div class="col-md-6 mb-3">

            <label class="form-label">

              Category

            </label>

            <select
              class="form-select"
              formControlName="categoryId">

              <option [ngValue]="null">

                Select Category

              </option>

              <option
                *ngFor="let category of categories"
                [value]="category.id">

                {{ category.name }}

              </option>

            </select>

            <small
  class="text-danger"
  *ngIf="
    productForm.get('categoryId')?.touched &&
    productForm.get('categoryId')?.errors?.['required']
  ">

  Category is required.

</small>

          </div>

          <!-- Brand -->

          <div class="col-md-6 mb-3">

            <label class="form-label">

              Brand

            </label>

            <select
              class="form-select"
              formControlName="brandId">

              <option [ngValue]="null">

                Select Brand

              </option>

              <option
                *ngFor="let brand of brands"
                [value]="brand.id">

                {{ brand.name }}

              </option>

            </select>

            <small
  class="text-danger"
  *ngIf="
    productForm.get('brandId')?.touched &&
    productForm.get('brandId')?.errors?.['required']
  ">

  Brand is required.

</small>

          </div>

        </div>

        <div class="row">

          <!-- Status -->

          <div class="col-md-6 mb-3">

            <label class="form-label">

              Status

            </label>

            <select
              class="form-select"
              formControlName="status">

              <option
                *ngFor="let status of statuses"
                [value]="status">

                {{ status }}

              </option>

            </select>

            <small
  class="text-danger"
  *ngIf="
    productForm.get('status')?.touched &&
    productForm.get('status')?.errors?.['required']
  ">

  Status is required.

</small>

          </div>

          <!-- Release Date -->

          <div class="col-md-6 mb-3">

            <label class="form-label">

              Release Date

            </label>

            <input
              type="date"
              class="form-control"
              formControlName="releaseDate">

          </div>

          <small
  class="text-danger"
  *ngIf="
    productForm.get('releaseDate')?.touched &&
    productForm.get('releaseDate')?.errors?.['required']
  ">

  Release date is required.

</small>

        </div>

        <!-- Upload -->

        <div class="mb-4">

          <label class="form-label">

            Product Images

          </label>

          <input
            type="file"
            class="form-control"
            multiple
            accept="image/*"
            (change)="onFileSelect($event)">

        </div>

        <!-- Existing Images -->

        <div
          *ngIf="existingImages.length > 0"
          class="mb-4">

          <h6>

            Existing Images

          </h6>

          <div class="row">

            <div
              class="col-md-3 mb-3"
              *ngFor="
                let image of existingImages;
                let i=index
              ">

              <div class="card">

                <img
                  [src]="baseImageUrl+image"
                  class="card-img-top">

                <div class="card-body p-2">

                  <button
                    type="button"
                    class="btn btn-danger btn-sm w-100"
                    (click)="removeExistingImage(i)">

                    Remove

                  </button>

                </div>

              </div>

            </div>

          </div>

        </div>

        <!-- New Images -->

        <div
          *ngIf="newImagePreview.length > 0"
          class="mb-4">

          <h6>

            New Images

          </h6>

          <div class="row">

            <div
              class="col-md-3 mb-3"
              *ngFor="
                let image of newImagePreview;
                let i=index
              ">

              <div class="card">

                <img
                  [src]="image"
                  class="card-img-top">

                <div class="card-body p-2">

                  <button
                    type="button"
                    class="btn btn-warning btn-sm w-100"
                    (click)="removeNewImage(i)">

                    Remove

                  </button>

                </div>

              </div>

            </div>

          </div>

        </div>

        <!-- Buttons -->

        <div class="text-end">

          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="loading">

            {{ isEdit ? 'Update Product' : 'Create Product' }}

          </button>

        </div>

      </form>

    </div>

  </div>

</div>
