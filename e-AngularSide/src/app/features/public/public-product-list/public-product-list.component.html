<div class="container py-5">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-1">All Products</h2>
      <small class="text-muted">{{ totalElements }} Products Found</small>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <!-- Product Grid -->
  <div class="row g-4" *ngIf="!loading">

    <div
      class="col-12 col-sm-6 col-lg-4 col-xl-3"
      *ngFor="let product of products">

      <div class="card product-card h-100 border-0 shadow-sm">

        <!-- Image -->
        <div class="product-image">

          <img
            [src]="getImageUrl(product)"
            [alt]="product.name">

          <!-- Discount Badge -->
          <span
            class="badge bg-danger discount-badge"
            *ngIf="product.discountPrice">

            SALE

          </span>

        </div>

        <!-- Body -->
        <div class="card-body d-flex flex-column">

          <div class="text-muted small mb-1">
            {{ product.brandName }}
          </div>

          <h6 class="fw-semibold product-title">
            {{ product.name }}
          </h6>

          <div class="mb-3">

            <span class="fw-bold fs-5 text-primary">
              ৳ {{ product.price }}
            </span>

            <span
              *ngIf="product.discountPrice"
              class="text-muted text-decoration-line-through ms-2">

              ৳ {{ product.discountPrice }}

            </span>

          </div>

          <div class="mt-auto">

            <div class="d-flex gap-2">

  <button
    class="btn btn-outline-dark btn-sm flex-fill"
    [routerLink]="['/publicProductView', product.id]">

    <i class="fas fa-eye me-1"></i>
    View Details

  </button>

  <button
    class="btn btn-primary btn-sm flex-fill"
    (click)="addToCart(product)"
    [disabled]="!product.productVariantId">

    <i class="fas fa-shopping-cart me-1"></i>
    Add To Cart

  </button>

</div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- No Product -->
  <div
    *ngIf="!loading && products.length === 0"
    class="text-center py-5">

    <h4>No Products Found</h4>

  </div>

  <!-- Pagination -->
  <div
    class="pagination-wrapper mt-5"
    *ngIf="totalPages > 1">

    <button
      class="btn btn-outline-secondary"
      (click)="previousPage()"
      [disabled]="page==0">

      Previous

    </button>

    <button
      *ngFor="let p of [].constructor(totalPages); let i=index"
      class="btn"
      [class.btn-primary]="page==i"
      [class.btn-outline-primary]="page!=i"
      (click)="goToPage(i)">

      {{i+1}}

    </button>

    <button
      class="btn btn-outline-secondary"
      (click)="nextPage()"
      [disabled]="page>=totalPages-1">

      Next

    </button>

  </div>

</div>
