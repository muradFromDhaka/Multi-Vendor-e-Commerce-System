<div class="container py-4">

  <!-- Loading -->
  <div class="text-center py-5" *ngIf="loading">
    <div class="spinner-border text-primary"></div>
    <p class="mt-3">Loading Products...</p>
  </div>

  <!-- Product List -->
  <div class="row" *ngIf="!loading">

    <div
      class="col-xl-3 col-lg-4 col-md-6 col-sm-6 mb-4"
      *ngFor="let product of products">

      <div class="product-card">

        <!-- Image -->
        <div class="image-wrapper">

         <img [src]="getImageUrl(product)" [alt]="product.name">

        </div>

        <!-- Body -->

        <div class="card-body">

          <h5 class="product-name">

            {{product.name}}

          </h5>

          <div class="rating">

            ⭐ {{product.averageRating || 0}}

            <span>

              ({{product.totalReviews || 0}} Reviews)

            </span>

          </div>

          <div class="price-section">

            <span
              class="discount-price"
              *ngIf="product.discountPrice">

              {{product.discountPrice | currency:'BDT '}}

            </span>

            <span
              class="price"
              [class.strike]="product.discountPrice">

              {{product.price | currency:'BDT '}}

            </span>

          </div>

          <span
            class="badge bg-success"
            *ngIf="product.status=='ACTIVE'">

            Active

          </span>

          <span
            class="badge bg-danger"
            *ngIf="product.status!='ACTIVE'">

            {{product.status}}

          </span>

        </div>

        <!-- Footer -->

        <div class="card-footer">

          <button
            class="btn btn-outline-primary btn-sm"
            [routerLink]="['/product',product.id]">

            View

          </button>

          <button
            class="btn btn-warning btn-sm"
            (click)="addToCart(product)">

            Add Cart

          </button>

          <button
            *ngIf="authService.hasRole('ROLE_ADMIN')"
            class="btn btn-success btn-sm"
            (click)="editProduct(product.id)">

            Edit

          </button>

          <button
            *ngIf="authService.hasRole('ROLE_ADMIN')"
            class="btn btn-danger btn-sm"
            (click)="deleteProduct(product.id)">

            Delete

          </button>

        </div>

      </div>

    </div>

    <!-- Empty -->

    <div
      class="col-12 text-center py-5"
      *ngIf="products.length==0">

      <h4>No Products Found</h4>

    </div>

  </div>

</div>
