<div class="card shadow-sm">

    <div class="card-header">

        <h4 class="mb-0">
            Order Summary
        </h4>

    </div>

    <div class="card-body" *ngIf="cart">

        <div class="d-flex justify-content-between mb-2">

            <span>Total Items</span>

            <strong>{{ cart?.totalItems }}</strong>

        </div>

        <div class="d-flex justify-content-between mb-2">

            <span>Subtotal</span>

            <strong>{{ cart?.subtotal | currency:'BDT ' }}</strong>

        </div>

        <div class="d-flex justify-content-between mb-2">

            <span>Shipping Fee</span>

            <strong>{{ cart?.shippingFee | currency:'BDT ' }}</strong>

        </div>

        <div class="d-flex justify-content-between mb-3">

            <span>Discount</span>

            <strong>- {{ cart?.discount | currency:'BDT ' }}</strong>

        </div>

        <hr>

        <div class="d-flex justify-content-between total-price">

            <span>Total</span>

            <strong>{{ cart.totalAmount | currency:'BDT ' }}</strong>

        </div>

        <button
                class="btn btn-success w-100 mt-4"
                (click)="onPlaceOrder()">

            Place Order

        </button>

    </div>

</div>
