<div class="product-list-cards">

  <div class="header">

    <h2>Products</h2>

    <button
      class="add-btn"
      [routerLink]="['/admin/adminProductForm']"
      *ngIf="
        authService.hasRole('ROLE_ADMIN') ||
        authService.hasRole('ROLE_VENDOR')
      ">
      Add Product
    </button>

  </div>

  <div *ngIf="loading" class="loading">
    Loading...
  </div>

  <div
    class="cards-container"
    *ngIf="!loading && products.length">

    <div
      class="product-card"
      *ngFor="let product of products">

      <div class="image-wrapper">

        <img
          *ngIf="product.thumbnailUrl"
          [src]="'http://localhost:8080/' + product.thumbnailUrl"
          [alt]="product.name">

      </div>

      <div class="product-info">

        <h3>{{ product.name }}</h3>

        <p class="price">

          <span
            class="discount"
            *ngIf="product.discountPrice">

            {{ product.discountPrice | currency }}

          </span>

          <span
            [class.line-through]="product.discountPrice">

            {{ product.price | currency }}

          </span>

        </p>

        <p>

          ⭐ {{ product.averageRating || 0 }}

          ({{ product.totalReviews || 0 }} Reviews)

        </p>

        <p>

          Variants :
          {{ product.totalVariants }}

        </p>

        <p>

          Status :
          {{ product.status }}

        </p>

      </div>

      <div class="actions">

        <button
          class="view"
          (click)="viewProduct(product.id)">
          View
        </button>

        <button
          *ngIf="
            authService.hasRole('ROLE_ADMIN') ||
            authService.hasRole('ROLE_VENDOR')
          "
          (click)="editProduct(product.id)">
          Edit
        </button>

        <button
          class="delete"
          *ngIf="
            authService.hasRole('ROLE_ADMIN') ||
            authService.hasRole('ROLE_VENDOR')
          "
          (click)="deleteProduct(product.id)">
          Delete
        </button>

      </div>

    </div>

  </div>

<div
  class="pagination"
  *ngIf="totalPages > 1">

  <button
    (click)="previousPage()"
    [disabled]="page===0">
    &laquo; Previous
  </button>

  <ng-container *ngFor="let p of pages">

    <button
      *ngIf="p !== '...'"
      (click)="changePage(+p)"
      [class.active]="page===p">

      {{ +p + 1 }}

    </button>

    <span
      *ngIf="p==='...'"
      class="dots">
      ...
    </span>

  </ng-container>

  <button
    (click)="nextPage()"
    [disabled]="page===totalPages-1">

    Next &raquo;

  </button>

</div>

  <div
    *ngIf="!loading && products.length===0"
    class="no-products">

    No Products Found

  </div>

</div>
