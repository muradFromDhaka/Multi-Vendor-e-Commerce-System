<app-admin-navbar
  *ngIf="authService.hasRole('ROLE_ADMIN')">
</app-admin-navbar>

<app-vendor-navbar
  *ngIf="authService.hasRole('ROLE_VENDOR')">
</app-vendor-navbar>

<app-customer-navbar
  *ngIf="authService.hasRole('ROLE_USER')">
</app-customer-navbar>

<app-public-navbar
  *ngIf="
    !authService.hasRole('ROLE_ADMIN') &&
    !authService.hasRole('ROLE_VENDOR') &&
    !authService.hasRole('ROLE_USER')
  ">
</app-public-navbar>
